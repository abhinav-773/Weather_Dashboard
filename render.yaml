services:
  - type: web
    name: weather-dashboard-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: weather-db
          property: connectionString
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false

databases:
  - name: weather-db
    databaseName: weather
    user: weather_user
